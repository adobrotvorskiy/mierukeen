stages:
  - build
  - release

variables:
  GIT_DEPTH: "10"

# ── шаблон сборки под конкретную (GOARCH, GOMIPS, label) тройку ──
.build_template: &build_template
  stage: build
  image: golang:1.23-bookworm
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends git ca-certificates tar gzip
    - . build/versions.env
    - echo "MIERU=$MIERU_VERSION  SING_BOX=$SINGBOX_VERSION  TARGET=$ARCH_LABEL"
  script:
    - set -e
    - mkdir -p out/payload/opt/sbin out/payload/opt/etc/init.d out/payload/opt/etc/mkeen/profiles/default
    # ── копируем скрипты/конфиги из репо ──
    - cp opt/sbin/mkeen                                    out/payload/opt/sbin/mkeen
    - cp opt/etc/init.d/S99mkeen                           out/payload/opt/etc/init.d/S99mkeen
    - cp opt/etc/mkeen/profiles/default/mieru.json         out/payload/opt/etc/mkeen/profiles/default/
    - cp opt/etc/mkeen/profiles/default/singbox.json       out/payload/opt/etc/mkeen/profiles/default/
    # ── собираем mieru ──
    - git clone --depth=1 --branch "v$MIERU_VERSION" https://github.com/enfein/mieru.git src/mieru
    - cd src/mieru
    - GOOS=linux GOARCH=$GOARCH GOMIPS=$GOMIPS CGO_ENABLED=0
      go build -trimpath -ldflags="-s -w -X github.com/enfein/mieru/v3/pkg/version.Version=$MIERU_VERSION"
      -o "$CI_PROJECT_DIR/out/payload/opt/sbin/mieru" ./cmd/mieru
    - cd "$CI_PROJECT_DIR"
    # ── собираем sing-box ──
    - git clone --depth=1 --branch "v$SINGBOX_VERSION" https://github.com/SagerNet/sing-box.git src/sing-box
    - cd src/sing-box
    - GOOS=linux GOARCH=$GOARCH GOMIPS=$GOMIPS CGO_ENABLED=0
      go build -trimpath
      -tags "with_quic,with_grpc,with_dhcp,with_wireguard,with_ech,with_utls,with_clash_api"
      -ldflags="-s -w -X github.com/sagernet/sing-box/constant.Version=$SINGBOX_VERSION"
      -o "$CI_PROJECT_DIR/out/payload/opt/sbin/sing-box" ./cmd/sing-box
    - cd "$CI_PROJECT_DIR"
    # ── права + упаковка ──
    - chmod +x out/payload/opt/sbin/* out/payload/opt/etc/init.d/S99mkeen
    - cd out
    - VERSION="${CI_COMMIT_TAG:-dev-$CI_COMMIT_SHORT_SHA}"
    - TARBALL="mierukeen-${VERSION}-${ARCH_LABEL}.tar.gz"
    - tar -czf "$TARBALL" payload
    - sha256sum "$TARBALL" > "$TARBALL.sha256"
    - ls -la
  artifacts:
    name: "mierukeen-$CI_COMMIT_REF_SLUG-$ARCH_LABEL"
    paths:
      - out/mierukeen-*.tar.gz
      - out/mierukeen-*.sha256
    expire_in: 30 days

build:mipsle-softfloat:
  <<: *build_template
  variables:
    GOARCH: mipsle
    GOMIPS: softfloat
    ARCH_LABEL: mipsle-softfloat

build:aarch64:
  <<: *build_template
  variables:
    GOARCH: arm64
    GOMIPS: ""
    ARCH_LABEL: arm64

# ── релиз только по тегу vX.Y.Z ─────────────────────────────────────
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs:
    - job: build:mipsle-softfloat
      artifacts: true
    - job: build:aarch64
      artifacts: true
  script:
    - echo "release $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "mierukeen $CI_COMMIT_TAG"
    description: |
      mierukeen $CI_COMMIT_TAG — mieru + sing-box для Keenetic (Entware).

      Установка:
      ```
      curl -fsSL https://gitlab.com/adobrotvorskiy/mierukeen/-/raw/main/scripts/install.sh | sh
      ```
    assets:
      links:
        - name: mierukeen-$CI_COMMIT_TAG-mipsle-softfloat.tar.gz
          url:  $CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/out/mierukeen-$CI_COMMIT_TAG-mipsle-softfloat.tar.gz?job=build:mipsle-softfloat
          link_type: package
        - name: mierukeen-$CI_COMMIT_TAG-arm64.tar.gz
          url:  $CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/out/mierukeen-$CI_COMMIT_TAG-arm64.tar.gz?job=build:aarch64
          link_type: package
